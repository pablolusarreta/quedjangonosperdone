<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cuentas</title>
    <style>
        body {
            background-color: #f9f9f9
        }

        section {
            background-color: white;
            margin: 5% auto;
            max-width: 400px;
            padding: 40px;
            border: 1px solid #000;
        }

        span,
        h4 {
            display: inline-block;
            min-width: 100%;
        }

        span>b,
        h4>small {
            float: right;
            font-weight: lighter;
        }
    </style>
</head>

<body>
    <section>
        <h4>Jalgi Taberna<small>27/03/2026</small></h4>
        <p>200€ - 20% (40€) gastos = 160 / 4 = 40€</p>
        <br>
        <h4>3 Taberna<small>19/06/2026</small></h4>
        <p>150€ - 20% (30€) gastos = 120 / 4 = 30€</p>
        <br>
        <span>Ane<b>40€</b></span>
        <span>Koldo<b>30€</b></span>
        <span>Xanti<b>70€</b></span>
        <span>Biku<b>70€</b></span>
        <span>Pablo<b>70€ + 70€</b></span>

    </section>
</body>

</html>
